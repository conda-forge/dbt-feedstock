schema_version: 1

context:
  name: dbt-core
  version: 1.12.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/dbt_core-${{ version }}.tar.gz
  sha256: f7d6a34f6600a371b8771e813f6b1566ab6d1fb8cea691619c791f527b1f8d7e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - dbt = dbt.cli.main:cli

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    - agate >=1.7.0,<1.15
    - jinja2 >=3.1.3,<4
    - mashumaro >=3.9,<3.18
    - click >=8.3.0,<9.0
    - jsonschema >=4.19.1,<5.0
    - networkx >=2.3,<4.0
    - protobuf >=6.0,<8.0
    - requests <3.0.0
    - snowplow-tracker >=1.0.2,<2.0
    - pathspec >=0.9,<1.1
    - sqlparse >=0.5.5,<0.6.0
    - dbt-extractor >=0.5.0,<=0.6
    - dbt-common >=1.37.5,<2.0
    - dbt-adapters >=1.24.5,<2.0
    - dbt-protos >=1.0.514,<2.0
    - pydantic <3
    - packaging >20.9
    - pytz >=2015.7
    - pyyaml >=6.0
    - daff >=1.3.46
    - typing_extensions >=4.4
    - python-dotenv >=1.2
    - dbt-core-experimental-parser >=2.0.0a4,<3
    - metricflow >=0.211.0,<1.0
tests:
  - python:
      imports:
        - dbt
        - dbt.adapters
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - '*'
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - dbt --help

about:
  summary: With dbt, data analysts and engineers can build analytics the way engineers build applications.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/dbt-labs/dbt-core

extra:
  feedstock-name: dbt
  recipe-maintainers:
    - rxm7706
    - drewbanin
    - jthandy
    - maresb
    - thewchan
    - zaneselvans
