schema_version: 1

context:
  name: dbt-core
  version: 1.11.5

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/dbt_core-${{ version }}.tar.gz
  sha256: 7f0c8ee91e0d55e82469a2fbc8f18032856b17d435865cdd1042e59844469a22

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - dbt = dbt.cli.main:cli

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
  run:
    - python >=${{ python_min }}
    # Mashumaro is installed as "mashumaro[msgpack]", so the following comes from
    # the "extras_require" section of https://github.com/Fatal1ty/mashumaro/blob/master/setup.py
    - msgpack-python >=0.5.6
    # Use the right tag/version https://github.com/dbt-labs/dbt-core/blob/main/core/setup.py
    # Generated with Grayskull
    - agate >=1.7.0,<1.10
    - jinja2 >=3.1.3,<4
    - mashumaro >=3.9,<3.15
    - click >=8.3.0,<9.0
    - jsonschema >=4.19.1,<5.0
    - networkx >=2.3,<4.0
    - protobuf >=6.0,<7.0
    - requests <3.0.0
    - snowplow-tracker >=1.0.2,<2.0
    - pathspec >=0.9,<0.13
    - sqlparse >=0.5.0,<0.5.5
    - dbt-extractor >=0.5.0,<=0.6
    - dbt-semantic-interfaces >=0.9.0,<0.10
    - dbt-common >=1.37.2,<2.0
    - dbt-adapters >=1.15.5,<2.0
    - dbt-protos >=1.0.405,<2.0
    - pydantic <3
    - packaging >20.9
    - pytz >=2015.7
    - pyyaml >=6.0
    - daff >=1.3.46
    - typing_extensions >=4.4

tests:
  - python:
      imports:
        - dbt
        - dbt.adapters
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - dbt --help

about:
  summary: With dbt, data analysts and engineers can build analytics the way engineers build applications.
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/dbt-labs/dbt-core

extra:
  feedstock-name: dbt
  recipe-maintainers:
    - rxm7706
    - drewbanin
    - jthandy
    - maresb
    - thewchan
    - zaneselvans
